<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#0d1117">

<title>סנוקר מלאי</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{--bg:#0d1117;--surface:#161b22;--s2:#1c2128;--border:#30363d;--accent:#00d084;--a2:#00a86b;--text:#e6edf3;--muted:#8b949e;--dim:#484f58;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;}
.topbar{position:sticky;top:0;z-index:100;background:rgba(13,17,23,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#007a4a);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo-name{font-size:17px;font-weight:800;}
.logo-sub{font-size:11px;color:var(--muted);}
.topbtns{display:flex;gap:8px;align-items:center;}
.badge{background:var(--accent);color:#000;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;transition:all .2s;}
.badge.hide{opacity:0;transform:scale(.6);pointer-events:none;}
.btn{padding:8px 16px;border-radius:8px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;display:flex;align-items:center;gap:5px;}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-g:hover{color:var(--text);border-color:var(--muted);}
.btn-p{background:var(--accent);color:#000;}
.btn-p:hover{background:var(--a2);}
.btn-p:disabled{opacity:.4;cursor:not-allowed;}
.search-wrap{padding:14px 20px 0;max-width:680px;margin:0 auto;}
.search{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 14px;color:var(--text);font-family:'Heebo',sans-serif;font-size:14px;direction:rtl;outline:none;transition:border-color .2s;}
.search:focus{border-color:var(--accent);}
.search::placeholder{color:var(--dim);}
.cats{max-width:840px;margin:0 auto;padding:16px 14px 130px;}
.cat{margin-bottom:9px;border:1px solid var(--border);border-radius:11px;overflow:hidden;transition:border-color .2s;}
.cat.active{border-color:rgba(0,208,132,.4);}
.cat-hdr{display:flex;align-items:center;gap:10px;padding:13px 16px;background:var(--surface);cursor:pointer;user-select:none;}
.cat-hdr:hover{background:var(--s2);}
.cat-ico{font-size:19px;}
.cat-nm{font-size:14px;font-weight:700;flex:1;}
.cat-cnt{font-size:11px;color:var(--muted);background:var(--s2);padding:3px 8px;border-radius:20px;}
.cat-cnt.on{background:rgba(0,208,132,.15);color:var(--accent);font-weight:700;}
.chevron{color:var(--muted);font-size:11px;transition:transform .2s;}
.cat-hdr.open .chevron{transform:rotate(180deg);}
.cat-body{display:none;background:var(--bg);}
.cat-body.open{display:block;}
.sel-all{padding:9px 16px;border-bottom:1px solid var(--border);font-size:12px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:7px;}
.sel-all:hover{color:var(--text);}
.row{display:flex;align-items:center;gap:11px;padding:10px 16px;border-bottom:1px solid rgba(48,54,61,.5);transition:background .1s;}
.row:last-child{border-bottom:none;}
.row:hover{background:rgba(255,255,255,.02);}
.row.sel{background:rgba(0,208,132,.05);}
.chk{width:19px;height:19px;border:2px solid var(--border);border-radius:5px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.chk.on{background:var(--accent);border-color:var(--accent);}
.chk.on::after{content:"\2713";color:#000;font-size:11px;font-weight:800;}
.itm-nm{flex:1;font-size:13px;font-weight:500;}
.qty-wrap{display:flex;align-items:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.row.sel .qty-wrap{opacity:1;pointer-events:all;}
.qbtn{width:26px;height:26px;background:var(--s2);border:1px solid var(--border);color:var(--text);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qbtn:first-child{border-radius:6px 0 0 6px;}
.qbtn:last-child{border-radius:0 6px 6px 0;}
.qbtn:hover{background:var(--border);}
.qinp{width:40px;height:26px;background:var(--surface);border:1px solid var(--border);border-left:none;border-right:none;color:var(--text);font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;text-align:center;outline:none;}
.qinp::-webkit-inner-spin-button,.qinp::-webkit-outer-spin-button{-webkit-appearance:none;}
.floatbar{position:fixed;bottom:0;left:0;right:0;background:rgba(22,27,34,.97);border-top:1px solid var(--border);backdrop-filter:blur(14px);padding:14px 20px;display:flex;align-items:center;gap:14px;transform:translateY(100%);transition:transform .3s cubic-bezier(.16,1,.3,1);z-index:50;}
.floatbar.show{transform:translateY(0);}
.float-info{flex:1;font-size:13px;color:var(--muted);}
.float-info strong{color:var(--text);font-size:15px;}
.success{display:none;min-height:100vh;flex-direction:column;align-items:center;padding:36px 20px 60px;}
.success.show{display:flex;}
.s-icon{width:74px;height:74px;background:linear-gradient(135deg,var(--accent),#007a4a);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;margin-bottom:18px;animation:pop .4s cubic-bezier(.16,1,.3,1);}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.s-title{font-size:24px;font-weight:900;margin-bottom:5px;}
.s-sub{color:var(--muted);font-size:13px;margin-bottom:26px;}
.s-list{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:20px;width:100%;max-width:500px;text-align:right;}
.s-list h3{font-size:15px;font-weight:700;color:var(--accent);margin-bottom:3px;}
.s-date{font-size:11px;color:var(--muted);margin-bottom:13px;}
.s-sec{margin-bottom:14px;}
.s-sec-title{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--dim);margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid var(--border);}
.s-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px;}
.s-qty{background:var(--accent);color:#000;font-weight:700;font-size:11px;padding:2px 7px;border-radius:20px;min-width:28px;text-align:center;}
.s-foot{padding-top:9px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);}
.abtns{display:flex;flex-direction:column;gap:9px;margin-top:16px;width:100%;max-width:500px;}
.abtn{border:none;padding:12px 20px;border-radius:9px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;transition:all .2s;}
.abtn-send{background:var(--accent);color:#000;}
.abtn-send:hover{background:var(--a2);}
.abtn-send:disabled{opacity:.5;cursor:not-allowed;}
.abtn-pdf{background:var(--s2);color:var(--text);border:1px solid var(--border);}
.abtn-pdf:hover{border-color:var(--muted);}
.abtn-reset{background:transparent;color:var(--muted);border:1px solid var(--border);font-size:13px;}
.abtn-reset:hover{color:var(--text);}
.spin{width:15px;height:15px;border:2px solid rgba(0,0,0,.25);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;display:none;}
.spin.show{display:block;}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(18px);background:#1a2e1a;border:1px solid var(--accent);color:var(--accent);padding:10px 20px;border-radius:28px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:999;pointer-events:none;}
.toast.err{background:#2e1a1a;border-color:#f66;color:#f66;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.hidden{display:none!important;}
</style>
</head>

function toggle(cat, item) {
  var key = cat + "::" + item, row = getRow(cat, item); if (!row) return;

  if (sel[key]) { delete sel[key]; row.classList.remove("sel"); chk.classList.remove("on"); }
  else { sel[key] = parseInt(row.querySelector(".qinp").value) || 1; row.classList.add("sel"); chk.classList.add("on"); }
  updateUI();
}

function changeQty(cat, item, d) {

  var key = cat + "::" + item; if (sel[key]) sel[key] = v;
